<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20 Januari 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bungkus">
        <h5>.</h5>
        <h2>Aplkasi nilai siswa</h2>
        <input type="text" id="nama" placeholder="input nama siswa"><br><br>
        <input type="number" id="nilai" placeholder="input nilai siswa">
        <input type="number" id="kehadiran" placeholder="input kehadiran siswa"><br><br>

        <button onclick="tambahSiswa()">Input siswa</button>

        <table>
            <tr>
                <th>Nama |</th>
                <th>Nilai |</th>
                <th>Kehadiran |</th>
                <th>Grade |</th>
                <th>Status</th>
            </tr>
            <tbody id="tabelSiswa"></tbody>
        </table>

        <div class="rata-rata" id="ratarata"></div>
    </div>

    <script>
        const daftarSiswa = [];

        function tambahSiswa(){
            const nama = document.getElementById('nama').value;
            const nilai = parseFloat(document.getElementById('nilai').value);
            const kehadiran = parseFloat(document.getElementById('kehadiran').value);

            if (nama === "" || isNaN(nilai) || isNaN(kehadiran)){
                alert('Semua form harus terisi');
                return;
            }

            if (nilai < 0 || nilai > 100 || kehadiran < 0 || kehadiran > 100){
                alert('Nilai dan kehadiran harus 10 s/d 100');
                return;
            }

            let grade = "";
            if(nilai >=   85){
                grade = "A";
            }else if(nilai >= 75){
                grade = "B";
            }else if( nilai >= 60){
                grade = "C";
            }else{
                grade = "D"
            }

            let status = "";
            if(nilai >= 75 && kehadiran >= 80){
                status = "lulus";
            }else{
                status = "tidak lulus";
            }

            const siswa = {
                nama,
                nilai,
                kehadiran,
                grade,
                status
            };

            daftarSiswa.push(siswa);
            tampilkanSiswa();
            hitungRataRata();

            document.getElementById('nama').value = "";
            document.getElementById('nilai').value =  "";
            document.getElementById('kehadiran').value = "";
        }

        function tampilkanSiswa(){
            const tabel = document.getElementById('tabelSiswa');
            tabel.innerHTML = "";

            daftarSiswa.forEach(siswa => {
                const row = `
                <tr>
                    <td>${siswa.nama}</td>
                    <td>${siswa.nilai}</td>
                    <td>${siswa.kehadiran}</td>
                    <td>${siswa.grade}</td>
                    <td>${siswa.status}</td>
                </tr>
                `;
                tabel.innerHTML += row;
            });
        }

        function hitungRataRata(){
            let total = 0;
            
            daftarSiswa.forEach(siswa => {
                total += siswa.nilai
            });

            const rataRata = total / daftarSiswa.length;
            document.getElementById('ratarata').innerText = `
                 Rata-rata Nilai kelas : ${rataRata.toFixed(2)}
            `;
        }
    </script>
</body>
</html>
